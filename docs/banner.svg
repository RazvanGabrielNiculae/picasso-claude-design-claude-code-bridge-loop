<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Brick pattern -->
  <pattern id="brick" x="0" y="0" width="62" height="44" patternUnits="userSpaceOnUse">
    <rect width="62" height="44" fill="#2a1420"/>
    <rect x="0" y="0" width="62" height="2" fill="#0c0509"/>
    <rect x="0" y="0" width="2" height="44" fill="#0c0509"/>
    <rect x="0" y="22" width="62" height="2" fill="#0c0509"/>
    <rect x="31" y="22" width="2" height="22" fill="#0c0509"/>
  </pattern>

  <!-- Glow filters -->
  <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="b1"/>
    <feGaussianBlur stdDeviation="14" result="b2"/>
    <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b1"/>
    <feGaussianBlur stdDeviation="12" result="b2"/>
    <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="b1"/>
    <feGaussianBlur stdDeviation="10" result="b2"/>
    <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Background gradients -->
  <radialGradient id="bg-pink" cx="20%" cy="10%" r="55%">
    <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="bg-cyan" cx="85%" cy="30%" r="50%">
    <stop offset="0%" stop-color="#5ce1ff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#5ce1ff" stop-opacity="0"/>
  </radialGradient>

  <!-- Sign inner glow -->
  <radialGradient id="sign-bg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.18"/>
    <stop offset="55%" stop-color="#ff2d95" stop-opacity="0.05"/>
    <stop offset="78%" stop-color="#ff2d95" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background: brick -->
<rect width="1200" height="480" fill="url(#brick)"/>
<rect width="1200" height="480" fill="#1b0d14" opacity="0.35"/>
<rect width="1200" height="480" fill="url(#bg-pink)"/>
<rect width="1200" height="480" fill="url(#bg-cyan)"/>

<!-- Cables hanging from top -->
<rect x="207" y="0" width="3" height="72" fill="#040404" rx="1.5" transform="rotate(-5,208,0)"/>
<rect x="599" y="0" width="3" height="88" fill="#040404" rx="1.5"/>
<rect x="991" y="0" width="3" height="72" fill="#040404" rx="1.5" transform="rotate(5,992,0)"/>

<!-- Neon sign outer glow layer -->
<rect x="96" y="72" width="1008" height="310" rx="36" fill="none" stroke="#ff2d95" stroke-width="1" opacity="0.25" filter="url(#glow-pink)"/>

<!-- Neon sign main box -->
<rect x="100" y="76" width="1000" height="302" rx="32"
  fill="url(#sign-bg)"
  stroke="#ff2d95" stroke-width="3"
  filter="url(#glow-pink)"
  style=""/>
<rect x="100" y="76" width="1000" height="302" rx="32"
  fill="none"
  stroke="#ff2d95" stroke-width="3"/>

<!-- Inner border glow -->
<rect x="116" y="92" width="968" height="270" rx="24"
  fill="none"
  stroke="#ff4fa8" stroke-width="1.5"
  opacity="0.7"
  filter="url(#glow-soft)"/>

<!-- Brackets top -->
<rect x="190" y="66" width="32" height="46" rx="5" fill="#111" stroke="#222" stroke-width="1"/>
<rect x="584" y="52" width="32" height="54" rx="5" fill="#111" stroke="#222" stroke-width="1"/>
<rect x="978" y="66" width="32" height="46" rx="5" fill="#111" stroke="#222" stroke-width="1"/>

<!-- Main title: PICASSO + BRIDGE -->
<!-- Yellow PICASSO -->
<text x="600" y="218"
  font-family="Impact, 'Arial Black', Arial, sans-serif"
  font-size="130"
  font-weight="900"
  fill="#ffd83d"
  text-anchor="middle"
  letter-spacing="12"
  filter="url(#glow-yellow)">PICASSO</text>

<!-- Cyan decoration: left orb -->
<circle cx="116" cy="227" r="28" fill="none" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-cyan)" opacity="0.9"/>
<line x1="121" y1="218" x2="141" y2="218" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-soft)"/>
<line x1="118" y1="227" x2="141" y2="224" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-soft)"/>
<line x1="121" y1="236" x2="141" y2="233" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-soft)"/>

<!-- Cyan decoration: right orb -->
<circle cx="1084" cy="227" r="28" fill="none" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-cyan)" opacity="0.9"/>
<line x1="1059" y1="218" x2="1079" y2="218" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-soft)"/>
<line x1="1059" y1="224" x2="1082" y2="227" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-soft)"/>
<line x1="1059" y1="233" x2="1079" y2="236" stroke="#5ce1ff" stroke-width="2.5" filter="url(#glow-soft)"/>

<!-- Pink swap arrow -->
<text x="600" y="268"
  font-family="Impact, 'Arial Black', Arial, sans-serif"
  font-size="28"
  fill="#ff2d95"
  text-anchor="middle"
  letter-spacing="18"
  filter="url(#glow-pink)">&#x2014;&#x25C4;  BRIDGE  &#x25BA;&#x2014;</text>

<!-- Subtitle -->
<text x="600" y="318"
  font-family="'Courier New', Courier, monospace"
  font-size="14"
  fill="#ff4fa8"
  text-anchor="middle"
  letter-spacing="8"
  filter="url(#glow-soft)"
  opacity="0.9">DESIGN  ·  IMPLEMENT  ·  CONVERGE</text>

<!-- Bottom pill tag -->
<rect x="464" y="338" width="272" height="28" rx="14"
  fill="none"
  stroke="#ff2d95" stroke-width="1.5"
  opacity="0.7"/>
<text x="600" y="357"
  font-family="'Courier New', Courier, monospace"
  font-size="11"
  fill="#ff4fa8"
  text-anchor="middle"
  letter-spacing="4"
  opacity="0.85">v0.1  ·  Claude Code  ·  MIT</text>

<!-- Bottom stats row -->
<text x="230" y="430"
  font-family="'Courier New', Courier, monospace"
  font-size="12"
  fill="#5ce1ff"
  text-anchor="middle"
  letter-spacing="2"
  filter="url(#glow-soft)"
  opacity="0.7">9 PATTERNS</text>
<text x="390" y="430"
  font-family="'Courier New', Courier, monospace"
  font-size="12"
  fill="#ffd83d"
  text-anchor="middle"
  letter-spacing="2"
  opacity="0.7">5 MODES</text>
<text x="600" y="430"
  font-family="'Courier New', Courier, monospace"
  font-size="12"
  fill="#ff4fa8"
  text-anchor="middle"
  letter-spacing="2"
  opacity="0.7">GATE SCORE 9.0 / 10</text>
<text x="810" y="430"
  font-family="'Courier New', Courier, monospace"
  font-size="12"
  fill="#ffd83d"
  text-anchor="middle"
  letter-spacing="2"
  opacity="0.7">6 MAX ROUNDS</text>
<text x="970" y="430"
  font-family="'Courier New', Courier, monospace"
  font-size="12"
  fill="#5ce1ff"
  text-anchor="middle"
  letter-spacing="2"
  opacity="0.7">KARPATHY ×4</text>

<!-- Separator line bottom -->
<line x1="100" y1="410" x2="1100" y2="410" stroke="#ff2d95" stroke-width="0.5" opacity="0.2"/>

<!-- Outer frame -->
<rect x="1" y="1" width="1198" height="478" rx="4" fill="none" stroke="#2a1420" stroke-width="1" opacity="0.8"/>
</svg>
