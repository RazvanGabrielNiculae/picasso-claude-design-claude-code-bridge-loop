<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060B14"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#7FB3FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#4F8EF7" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Glow orb left -->
  <ellipse cx="180" cy="200" rx="120" ry="120" fill="#4F8EF7" opacity="0.06"/>
  <!-- Glow orb right -->
  <ellipse cx="1020" cy="200" rx="100" ry="100" fill="#4F8EF7" opacity="0.05"/>

  <!-- Loop diagram — left node -->
  <rect x="80" y="155" width="180" height="90" rx="8" fill="#0D1929" stroke="#1A2540" stroke-width="1.5"/>
  <text x="170" y="194" font-family="monospace" font-size="13" fill="#4F8EF7" text-anchor="middle" filter="url(#glow)">/picasso</text>
  <text x="170" y="213" font-family="monospace" font-size="11" fill="#6B7A9E" text-anchor="middle">Claude Code</text>
  <text x="170" y="230" font-family="monospace" font-size="10" fill="#4F8EF7" text-anchor="middle" opacity="0.6">local agent</text>

  <!-- Loop diagram — right node -->
  <rect x="940" y="155" width="180" height="90" rx="8" fill="#0D1929" stroke="#1A2540" stroke-width="1.5"/>
  <text x="1030" y="194" font-family="monospace" font-size="13" fill="#4F8EF7" text-anchor="middle" filter="url(#glow)">Claude Design</text>
  <text x="1030" y="213" font-family="monospace" font-size="11" fill="#6B7A9E" text-anchor="middle">claude.ai/design</text>
  <text x="1030" y="230" font-family="monospace" font-size="10" fill="#4F8EF7" text-anchor="middle" opacity="0.6">web design tool</text>

  <!-- Arrow top (prompt →) -->
  <line x1="265" y1="172" x2="935" y2="172" stroke="#4F8EF7" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <polygon points="935,167 945,172 935,177" fill="#4F8EF7" opacity="0.7"/>
  <text x="600" y="162" font-family="monospace" font-size="10" fill="#4F8EF7" text-anchor="middle" opacity="0.8">structured prompt</text>

  <!-- Arrow bottom (tokens ←) -->
  <line x1="935" y1="228" x2="265" y2="228" stroke="#7FB3FF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="265,223 255,228 265,233" fill="#7FB3FF" opacity="0.5"/>
  <text x="600" y="248" font-family="monospace" font-size="10" fill="#6B7A9E" text-anchor="middle">tokens + preview</text>

  <!-- Center: PICASSO text -->
  <text x="600" y="115" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#E8EBF4" text-anchor="middle" letter-spacing="-2" filter="url(#glow-strong)">PICASSO</text>

  <!-- Subtitle -->
  <text x="600" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6B7A9E" text-anchor="middle" letter-spacing="4">CLAUDE DESIGN  ↔  CLAUDE CODE  BRIDGE LOOP</text>

  <!-- Score pill -->
  <rect x="516" y="290" width="168" height="32" rx="16" fill="#0D1929" stroke="#1A2540" stroke-width="1"/>
  <circle cx="536" cy="306" r="6" fill="#4F8EF7" opacity="0.8"/>
  <text x="610" y="311" font-family="monospace" font-size="12" fill="#E8EBF4" text-anchor="middle">gate score  9.0 / 10</text>

  <!-- Bottom tags -->
  <text x="600" y="368" font-family="monospace" font-size="11" fill="#4F8EF7" text-anchor="middle" opacity="0.5" letter-spacing="3">9 PATTERNS  ·  5 MODES  ·  KARPATHY PRINCIPLES</text>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="398" rx="4" fill="none" stroke="#1A2540" stroke-width="1"/>
</svg>
