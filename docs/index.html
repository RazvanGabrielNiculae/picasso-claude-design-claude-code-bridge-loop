<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Picasso Bridge Loop · v1.1 · Design. Implement. Converge.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --pink:#ff2d95; --pink-glow:#ff4fa8; --pink-soft:#ffa2cf;
    --yellow:#ffd83d; --yellow-glow:#fff07a;
    --cyan:#5ce1ff; --cyan-glow:#8eecff;
    --green:#7cf0a0; --amber:#ffb14a;
    --brick-dark:#1b0d14; --brick-mid:#2a1420; --mortar:#0c0509;
    --ink:#f8eef2; --ink-dim:#b9a3ad; --ink-mid:#cdb7c0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--brick-dark);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  body{background:radial-gradient(1200px 700px at 20% -10%, rgba(255,45,149,.18), transparent 60%),radial-gradient(1000px 600px at 85% 5%, rgba(92,225,255,.12), transparent 65%),var(--brick-dark);min-height:100vh}
  a{color:var(--cyan);text-decoration:none;border-bottom:1px dotted rgba(92,225,255,.35)}
  a:hover{color:var(--cyan-glow);border-bottom-color:var(--cyan)}

  .brick-wall{position:fixed;inset:0;z-index:-1;background-color:var(--brick-mid);
    background-image:linear-gradient(var(--mortar) 2px, transparent 2px),linear-gradient(90deg, var(--mortar) 2px, transparent 2px),repeating-linear-gradient(90deg, rgba(0,0,0,0) 0 60px, rgba(0,0,0,.15) 60px 62px),repeating-linear-gradient(180deg, transparent 0 42px, rgba(255,255,255,.02) 42px 44px);
    background-size:62px 44px, 62px 44px, 124px 44px, 100% 88px;opacity:.8}
  .brick-wall::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 12%, rgba(255,45,149,.28), transparent 55%),radial-gradient(ellipse at 75% 40%, rgba(92,225,255,.18), transparent 55%),radial-gradient(ellipse at 50% 80%, rgba(255,216,61,.10), transparent 60%);mix-blend-mode:screen;pointer-events:none}
  .brick-wall::before{content:"";position:absolute;inset:0;background-image:linear-gradient(90deg, var(--mortar) 2px, transparent 2px);background-size:62px 44px;background-position:31px 44px;opacity:.55;mix-blend-mode:multiply}

  /* NEON SIGN */
  .sign-wrap{position:relative;margin:80px auto 0;max-width:1180px;padding:48px 40px 56px}
  .sign{position:relative;border-radius:40px;padding:68px 56px 72px;
    background:radial-gradient(ellipse at 50% 50%, rgba(255,45,149,.22), rgba(255,45,149,.06) 55%, transparent 78%),linear-gradient(180deg, rgba(40,10,24,.35), rgba(20,5,12,.55));
    border:3px solid var(--pink);
    box-shadow:0 0 0 6px rgba(255,45,149,.12), 0 0 50px rgba(255,45,149,.55), 0 0 110px rgba(255,45,149,.35), inset 0 0 80px rgba(255,45,149,.18)}
  .sign::before{content:"";position:absolute;inset:16px;border-radius:28px;border:2px solid var(--pink-glow);box-shadow:0 0 12px var(--pink), 0 0 28px rgba(255,45,149,.6), inset 0 0 22px rgba(255,79,168,.35);pointer-events:none}
  .bracket{position:absolute;width:32px;height:46px;background:linear-gradient(180deg,#111 0%, #2a2a2a 50%, #0a0a0a 100%);border-radius:6px;box-shadow:inset 0 2px 0 rgba(255,255,255,.08), 0 2px 8px rgba(0,0,0,.7);z-index:3}
  .bracket::after{content:"";position:absolute;left:50%;top:-24px;transform:translateX(-50%);width:4px;height:32px;background:#050505;border-radius:2px}
  .bracket.tl{top:-10px;left:130px}.bracket.tm{top:-10px;left:50%;transform:translateX(-50%)}.bracket.tr{top:-10px;right:130px}
  .bracket.bl{bottom:-10px;left:130px}.bracket.bm{bottom:-10px;left:50%;transform:translateX(-50%)}.bracket.br{bottom:-10px;right:130px}
  .cable{position:absolute;width:3px;background:#040404;z-index:2;border-radius:2px}
  .cable.c1{top:-70px;left:146px;height:70px;transform:rotate(-6deg)}
  .cable.c2{top:-90px;left:50%;height:90px}
  .cable.c3{top:-70px;right:146px;height:70px;transform:rotate(6deg)}

  .neon-title{font-family:'Monoton',cursive;font-weight:400;font-size:clamp(60px, 10vw, 140px);letter-spacing:.02em;line-height:1;margin:0;color:var(--yellow);
    text-shadow:0 0 4px #fff6b3, 0 0 10px var(--yellow), 0 0 22px var(--yellow-glow), 0 0 48px rgba(255,216,61,.8), 0 0 90px rgba(255,120,0,.55);
    display:flex;align-items:center;justify-content:center;gap:.14em;flex-wrap:wrap}
  .neon-title .bridge{color:var(--cyan);text-shadow:0 0 4px #e6f9ff, 0 0 10px var(--cyan), 0 0 26px var(--cyan-glow), 0 0 52px rgba(92,225,255,.75)}
  .neon-orbs{display:flex;justify-content:center;align-items:center;gap:22px;margin-top:20px}
  .orb{width:64px;height:64px;border-radius:50%;border:3px solid var(--cyan);position:relative;box-shadow:0 0 12px var(--cyan), 0 0 28px rgba(92,225,255,.55), inset 0 0 10px rgba(92,225,255,.25)}
  .orb::before,.orb::after,.orb i{content:"";position:absolute;left:12%;right:12%;height:3px;border-radius:2px;background:var(--cyan);box-shadow:0 0 8px var(--cyan), 0 0 14px var(--cyan-glow)}
  .orb::before{top:28%;transform:skewY(-8deg)}
  .orb i{top:46%;transform:skewY(-8deg);position:absolute;left:12%;right:12%;display:block}
  .orb::after{top:64%;transform:skewY(-8deg)}
  .orb.alt{border-color:var(--yellow);box-shadow:0 0 12px var(--yellow), 0 0 28px rgba(255,216,61,.5), inset 0 0 10px rgba(255,216,61,.25)}
  .orb.alt::before,.orb.alt::after,.orb.alt i{background:var(--yellow);box-shadow:0 0 8px var(--yellow), 0 0 14px var(--yellow-glow)}
  .swap-arrow{font-family:'Monoton',cursive;font-size:44px;color:var(--pink);text-shadow:0 0 10px var(--pink), 0 0 24px rgba(255,45,149,.7);line-height:1}
  .neon-sub{margin:28px 0 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:var(--pink-glow);text-shadow:0 0 10px rgba(255,45,149,.8), 0 0 22px rgba(255,45,149,.5)}
  .neon-tag{margin:16px auto 0;width:fit-content;padding:7px 16px;border:1.5px solid var(--pink);border-radius:999px;color:var(--pink-glow);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;box-shadow:0 0 14px rgba(255,45,149,.5), inset 0 0 8px rgba(255,45,149,.2)}
  @keyframes flicker{0%,19%,21%,23%,80%,100%{opacity:1}20%,22%{opacity:.82}82%{opacity:.9}}
  .flick{animation:flicker 6s infinite}

  /* TOC */
  .toc{max-width:1180px;margin:22px auto 0;padding:12px 20px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(12,5,9,.72);backdrop-filter:blur(6px);font-family:'JetBrains Mono',monospace;font-size:12px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;color:var(--ink-dim)}
  .toc a{border:none;color:var(--ink-dim)}
  .toc a:hover{color:var(--pink-glow)}

  /* STATS */
  .stats{max-width:1180px;margin:28px auto 0;padding:0 20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media (max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(12,5,9,.68);backdrop-filter:blur(6px);padding:16px 18px;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg, var(--pink), transparent)}
  .stat .v{font-family:'Monoton',cursive;font-weight:400;font-size:38px;line-height:1;color:var(--yellow);text-shadow:0 0 8px rgba(255,216,61,.6), 0 0 18px rgba(255,216,61,.35)}
  .stat .l{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);letter-spacing:.14em;text-transform:uppercase;margin-top:8px}
  .stat .s{font-size:12px;color:#b9a3ad;margin-top:4px;line-height:1.45}

  /* DOCS */
  .docs{max-width:1100px;margin:28px auto 60px;padding:0 28px}
  .kicker{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px}
  h2.sec{font-family:'Monoton',cursive;font-weight:400;font-size:46px;letter-spacing:.03em;line-height:1.08;margin:0 0 18px;color:var(--pink);text-shadow:0 0 10px rgba(255,45,149,.6), 0 0 24px rgba(255,45,149,.4)}
  h2.sec.yellow{color:var(--yellow);text-shadow:0 0 10px var(--yellow-glow), 0 0 26px rgba(255,216,61,.5)}
  h2.sec.cyan{color:var(--cyan);text-shadow:0 0 10px var(--cyan-glow), 0 0 26px rgba(92,225,255,.5)}
  p.lede{color:#e9dde2;font-size:18px;line-height:1.55;max-width:64ch;text-wrap:pretty}
  p{color:#cbb9c1;font-size:15px;line-height:1.7;max-width:72ch;text-wrap:pretty}
  h3.sub{font-family:'Inter',sans-serif;font-weight:600;font-size:18px;margin:28px 0 10px;color:var(--ink);letter-spacing:-.005em}
  code.inl{font-family:'JetBrains Mono',monospace;font-size:13px;background:rgba(255,45,149,.12);color:var(--pink-glow);border:1px solid rgba(255,45,149,.25);padding:1px 7px;border-radius:6px}

  .section{margin:52px 0 0;padding:30px 32px 34px;border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(12,5,9,.68);backdrop-filter:blur(6px);scroll-margin-top:20px}

  /* CODE */
  .code{margin:14px 0 4px;background:#0a0508;border:1px solid rgba(255,255,255,.08);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;overflow:hidden}
  .code-head{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.06);color:var(--ink-dim);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
  .code pre{margin:0;padding:16px 20px;overflow-x:auto;color:#e9dde2;line-height:1.65}
  .com{color:#7a6770}.cmd{color:var(--cyan)}.flag{color:var(--yellow)}.str{color:var(--pink-glow)}.ok{color:#7cf0a0}.warn{color:#ffb14a}

  /* GRID + CARDS */
  .grid{display:grid;gap:12px}
  .grid.c2{grid-template-columns:repeat(2,1fr)}.grid.c3{grid-template-columns:repeat(3,1fr)}.grid.c4{grid-template-columns:repeat(4,1fr)}
  @media (max-width:880px){.grid.c3,.grid.c4{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:580px){.grid.c2,.grid.c3,.grid.c4{grid-template-columns:1fr}}
  .card{border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.02);padding:18px 20px;position:relative}
  .card .tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--yellow);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;text-shadow:0 0 8px rgba(255,216,61,.3)}
  .card.cyan .tag{color:var(--cyan);text-shadow:0 0 8px rgba(92,225,255,.3)}
  .card.pink .tag{color:var(--pink-glow);text-shadow:0 0 8px rgba(255,45,149,.3)}
  .card h4{font-family:'Inter',sans-serif;font-weight:600;font-size:15.5px;margin:0 0 6px;color:var(--ink)}
  .card p{margin:0;font-size:13.5px;color:#b6adb3;line-height:1.55}
  .card .meta{margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);letter-spacing:.06em;word-break:break-all}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:14px}
  .tbl th,.tbl td{padding:11px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
  .tbl th{color:var(--ink-dim);font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
  .tbl td{color:#cbb9c1}
  .tbl td.mono{font-family:'JetBrains Mono',monospace;color:var(--cyan);white-space:nowrap}
  .tbl td.num{font-family:'JetBrains Mono',monospace;color:var(--yellow);text-align:right}
  .tbl td.pink{color:var(--pink-glow);font-family:'JetBrains Mono',monospace}

  /* SCORE */
  .score-wrap{display:grid;grid-template-columns:320px 1fr;gap:24px;align-items:center;margin-top:14px}
  @media (max-width:760px){.score-wrap{grid-template-columns:1fr}}
  .score-viz{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:22px;display:grid;place-items:center;position:relative}
  .score-viz svg{width:100%;max-width:260px}
  .score-center{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
  .score-num{font-family:'Monoton',cursive;font-weight:400;font-size:60px;color:var(--yellow);line-height:1;text-shadow:0 0 10px var(--yellow-glow), 0 0 22px rgba(255,216,61,.5)}
  .score-lab{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-dim);letter-spacing:.2em;text-transform:uppercase;margin-top:2px}

  /* BACKPRESSURE */
  .meter{display:flex;gap:4px;margin-top:14px}
  .meter .bar{flex:1;height:54px;border-radius:6px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.1);padding:8px 10px;display:flex;flex-direction:column;justify-content:center;gap:2px}
  .meter .bar .r{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-dim);letter-spacing:.1em}
  .meter .bar .n{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink)}
  .meter .bar.l1{border-color:rgba(124,240,160,.45)}.meter .bar.l1 .n{color:var(--green);text-shadow:0 0 8px rgba(124,240,160,.4)}
  .meter .bar.l2{border-color:rgba(92,225,255,.45)}.meter .bar.l2 .n{color:var(--cyan);text-shadow:0 0 8px rgba(92,225,255,.4)}
  .meter .bar.l3{border-color:rgba(255,216,61,.45)}.meter .bar.l3 .n{color:var(--yellow);text-shadow:0 0 8px rgba(255,216,61,.4)}
  .meter .bar.l4{border-color:rgba(255,177,74,.55);background:rgba(255,177,74,.06)}.meter .bar.l4 .n{color:var(--amber);text-shadow:0 0 8px rgba(255,177,74,.4)}
  .meter .bar.l5{border-color:rgba(255,45,149,.55);background:rgba(255,45,149,.06)}.meter .bar.l5 .n{color:var(--pink-glow);text-shadow:0 0 8px rgba(255,45,149,.4)}

  /* STEPS */
  .steps{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .step{flex:1 1 calc(14% - 8px);min-width:150px;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px 14px;background:rgba(255,255,255,.02)}
  .step .n{font-family:'Monoton',cursive;font-size:24px;color:var(--cyan);line-height:1;text-shadow:0 0 8px var(--cyan-glow), 0 0 18px rgba(92,225,255,.45)}
  .step:nth-child(2) .n,.step:nth-child(5) .n{color:var(--pink);text-shadow:0 0 8px rgba(255,45,149,.6), 0 0 18px rgba(255,45,149,.35)}
  .step:nth-child(3) .n,.step:nth-child(6) .n{color:var(--yellow);text-shadow:0 0 8px rgba(255,216,61,.6), 0 0 18px rgba(255,216,61,.35)}
  .step .t{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink);margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
  .step .d{font-size:12px;color:#a99ea4;line-height:1.5;margin-top:4px}

  /* ARCH */
  .arch{margin:16px 0 4px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:radial-gradient(ellipse at 50% 50%, rgba(255,45,149,.08), transparent 70%), #0a0508;padding:22px 20px}
  .arch svg{width:100%;height:auto;display:block}
  .flow-diagram{background:#0a0508;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:22px 18px;overflow-x:auto;margin-top:10px}
  .flow-diagram pre{margin:0;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.75;color:#cbb9c1;white-space:pre}

  /* MODES */
  .modes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:14px}
  @media (max-width:980px){.modes-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:520px){.modes-grid{grid-template-columns:1fr}}
  .mode{border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.02);padding:16px;position:relative}
  .mode.def{border-color:rgba(255,216,61,.5);background:linear-gradient(180deg, rgba(255,216,61,.06), rgba(255,255,255,.02))}
  .mode .flag{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--yellow);margin-bottom:6px;word-break:break-all;text-shadow:0 0 8px rgba(255,216,61,.3)}
  .mode h4{font-family:'Inter',sans-serif;font-weight:600;font-size:14.5px;margin:0 0 6px;color:var(--ink)}
  .mode p{font-size:12.5px;color:#a99ea4;line-height:1.5;margin:0 0 6px}
  .mode .use{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--cyan);text-shadow:0 0 8px rgba(92,225,255,.3)}
  .mode .def-tag{position:absolute;top:10px;right:10px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--yellow);border:1px solid rgba(255,216,61,.4);padding:2px 6px;border-radius:999px;letter-spacing:.16em;text-shadow:0 0 6px rgba(255,216,61,.3)}

  /* KARP */
  .karp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
  @media (max-width:880px){.karp-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:520px){.karp-grid{grid-template-columns:1fr}}
  .karp{border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.02);padding:18px;position:relative;overflow:hidden}
  .karp::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg, var(--pink), var(--yellow), var(--cyan), transparent);box-shadow:0 0 12px rgba(255,45,149,.4)}
  .karp .n{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-dim);letter-spacing:.2em}
  .karp h4{font-family:'Monoton',cursive;font-weight:400;font-size:22px;margin:8px 0 10px;color:var(--pink);text-shadow:0 0 8px rgba(255,45,149,.55), 0 0 18px rgba(255,45,149,.3);letter-spacing:.02em;line-height:1.1}
  .karp:nth-child(2) h4{color:var(--yellow);text-shadow:0 0 8px rgba(255,216,61,.55), 0 0 18px rgba(255,216,61,.3)}
  .karp:nth-child(3) h4{color:var(--cyan);text-shadow:0 0 8px rgba(92,225,255,.55), 0 0 18px rgba(92,225,255,.3)}
  .karp:nth-child(4) h4{color:var(--pink-glow);text-shadow:0 0 8px rgba(255,79,168,.55), 0 0 18px rgba(255,45,149,.3)}
  .karp p{margin:0 0 8px;font-size:13px;color:#b6adb3;line-height:1.55}
  .karp .how{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);border-top:1px dashed rgba(255,255,255,.1);padding-top:8px;margin-top:10px}
  .karp .cred{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-dim);letter-spacing:.1em;margin-top:10px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.06)}

  /* PATTERNS */
  .pat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  @media (max-width:880px){.pat-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:520px){.pat-grid{grid-template-columns:1fr}}
  .pat{border:1px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.02);padding:16px 18px}
  .pat .n{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--yellow);letter-spacing:.16em;text-shadow:0 0 8px rgba(255,216,61,.3)}
  .pat h4{font-family:'Inter',sans-serif;font-weight:600;font-size:14.5px;margin:6px 0 6px;color:var(--ink)}
  .pat p{margin:0 0 8px;font-size:12.5px;color:#a99ea4;line-height:1.55}
  .pat .src{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-dim)}

  /* HOOKS */
  .hooks{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media (max-width:720px){.hooks{grid-template-columns:1fr}}

function SecScore(){
  let angle = -90;
  const radius = 100, stroke = 22, cx = 130, cy = 130;
  const colors = ["#ff2d95","#ff4fa8","#ffd83d","#ffb14a","#5ce1ff","#8eecff"];
  const segs = SCORE.map((s,i)=>{
    const span = (s.w/100)*360;
    const a0 = angle;
    const a1 = angle + span - 2;
    angle += span;
    const toXY = a => { const r=a*Math.PI/180; return [cx+radius*Math.cos(r), cy+radius*Math.sin(r)]; };
    const [x0,y0] = toXY(a0);
    const [x1,y1] = toXY(a1);
    const large = span > 180 ? 1 : 0;
    return <path key={i} d={`M ${x0} ${y0} A ${radius} ${radius} 0 ${large} 1 ${x1} ${y1}`} stroke={colors[i]} strokeWidth={stroke} fill="none" style={{filter:"drop-shadow(0 0 6px "+colors[i]+")"}}/>;
  });
  return (
    <div className="section" id="score">
      <div className="kicker">08 · Gate scoring</div>
      <h2 className="sec">Fidelity, weighted across six criteria.</h2>
      <p>Every round emits a single value in [0, 10]. Default gate <code className="inl">9.0</code>. Raise to <code className="inl">9.5</code> for brand-critical landings; lower to <code className="inl">8.0</code> for quick prototypes.</p>
      <div className="score-wrap">
        <div className="score-viz">
          <svg viewBox="0 0 260 260">
            <circle cx={cx} cy={cy} r={radius} stroke="rgba(255,255,255,.08)" strokeWidth={stroke} fill="none"/>
            {segs}
          </svg>
          <div className="score-center"><div style={{textAlign:"center"}}><div className="score-num">9.0</div><div className="score-lab">default gate</div></div></div>
        </div>
        <div>
          <table className="tbl">
            <thead><tr><th>criterion</th><th style={{textAlign:"right"}}>weight</th><th>method</th></tr></thead>
            <tbody>
              {SCORE.map(s=>(
                <tr key={s.name}><td style={{color:"var(--ink)"}}>{s.name}</td><td className="num">{s.w}%</td><td>{s.method}</td></tr>
              ))}
            </tbody>
          </table>
          <Code title="score · one-line json (round 3)">{'{"r":3,"scores":{"col":9.2,"typ":8.8,"lay":9.1,"comp":8.5,"mot":8.0,"res":9.0},"total":8.9,"delta":+0.4}'}</Code>
        </div>
      </div>
    </div>
  );
}
